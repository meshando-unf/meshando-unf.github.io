<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Research workflow methods diagram</title>
  <desc id="desc">A research workflow diagram from field data and satellite observations through Python modeling and publication figures.</desc>
  <rect width="900" height="620" fill="#d8c7aa"/>
  <g fill="#f0e3cc" stroke="#201913" stroke-width="4">
    <rect x="70" y="210" width="150" height="100"/>
    <rect x="270" y="210" width="150" height="100"/>
    <rect x="470" y="210" width="150" height="100"/>
    <rect x="670" y="210" width="150" height="100"/>
  </g>
  <g stroke="#466f7a" stroke-width="7" stroke-linecap="round">
    <path d="M220 260 H270"/>
    <path d="M420 260 H470"/>
    <path d="M620 260 H670"/>
  </g>
  <path d="M145 395 C245 330 315 432 420 372 S612 302 754 374" fill="none" stroke="#a86f4d" stroke-width="6"/>
  <path d="M145 430 C270 370 350 470 490 410 S650 350 754 400" fill="none" stroke="#466f7a" stroke-width="4" stroke-dasharray="10 12"/>
  <g font-family="Courier New, monospace" fill="#201913" text-anchor="middle">
    <text x="145" y="266" font-size="14" letter-spacing="3">FIELD</text>
    <text x="345" y="266" font-size="14" letter-spacing="3">GIS</text>
    <text x="545" y="266" font-size="14" letter-spacing="3">PYTHON</text>
    <text x="745" y="266" font-size="14" letter-spacing="3">FIGURES</text>
  </g>
  <g font-family="Courier New, monospace" fill="#201913">
    <text x="54" y="76" font-size="24" letter-spacing="5">RESEARCH PIPELINE</text>
    <text x="54" y="108" font-size="13" letter-spacing="3">MEASUREMENTS / SATELLITE DATA / MODELING / PUBLICATION OUTPUTS</text>
  </g>
</svg>
