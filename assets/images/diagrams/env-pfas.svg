  <path d="M180 350 C300 292 418 300 548 326 C668 350 750 392 812 452" fill="none" stroke="#466f7a" stroke-width="6"/>
  <path d="M206 364 C330 340 445 360 570 384 C665 402 740 430 790 466" fill="none" stroke="#466f7a" stroke-width="3" stroke-dasharray="10 12"/>
